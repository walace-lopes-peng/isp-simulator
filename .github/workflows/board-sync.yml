name: Sprint Board Sync

on:
  push:
    branches: [dev]
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  pull_request:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

# Previne condições de corrida em commits simultâneos no mesmo branch/PR
concurrency:
  group: board-sync-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Sync and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPRINT_ISSUE_ID: 27
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Ensure we are working on the correct branch/ref
          BRANCH_NAME=${{ github.event.pull_request.head.ref || github.ref_name }}
          
          # Pull latest to avoid rebase conflicts (autostash handles local changes)
          git pull origin $BRANCH_NAME --rebase --autostash || true
          
          # Run the generator
          node scripts/sync-board.js
          
          # Atomic commit and push
          git add SPRINT.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update SPRINT.md"
            git push origin HEAD:$BRANCH_NAME
          fi
